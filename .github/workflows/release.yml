name: Release

# Builds forcola_shim for every supported target and attaches the
# tarballs (plus .sha256 sidecars) to the GitHub Release for the pushed
# tag. Tags are expected to be created by the release automation
# (see issue #8); pushing a v* tag by hand works the same way.
#
# workflow_dispatch runs the build matrix only, as a dry run; assets
# are uploaded only for tag pushes.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04

    defaults:
      run:
        working-directory: native/forcola_shim

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f 2)"
          fi
          artifact="forcola_shim-v${version}-${{ matrix.target }}.tar.gz"
          tar -czf "${artifact}" -C "target/${{ matrix.target }}/release" forcola_shim
          shasum -a 256 "${artifact}" > "${artifact}.sha256"
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (dry run)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: |
            native/forcola_shim/${{ steps.package.outputs.artifact }}
            native/forcola_shim/${{ steps.package.outputs.artifact }}.sha256

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            native/forcola_shim/${{ steps.package.outputs.artifact }}
            native/forcola_shim/${{ steps.package.outputs.artifact }}.sha256
