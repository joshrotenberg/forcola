name: Release

# Builds forcola_shim for every supported target, attaches the
# tarballs (plus .sha256 sidecars) to the GitHub Release for the tag,
# then publishes the hex package with the checksum file generated from
# those assets.
#
# Tags are created by release-please (release-please.yml), which
# dispatches this workflow at the new tag because GITHUB_TOKEN-created
# tags do not fire on-tag-push workflows. Pushing a v* tag by hand
# works the same way. A workflow_dispatch from a branch ref runs the
# build matrix only, as a dry run; assets are uploaded and the package
# published only when the ref is a tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04

    defaults:
      run:
        working-directory: native/forcola_shim

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f 2)"
          fi
          artifact="forcola_shim-v${version}-${{ matrix.target }}.tar.gz"
          tar -czf "${artifact}" -C "target/${{ matrix.target }}/release" forcola_shim
          shasum -a 256 "${artifact}" > "${artifact}.sha256"
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (dry run)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: |
            native/forcola_shim/${{ steps.package.outputs.artifact }}
            native/forcola_shim/${{ steps.package.outputs.artifact }}.sha256

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            native/forcola_shim/${{ steps.package.outputs.artifact }}
            native/forcola_shim/${{ steps.package.outputs.artifact }}.sha256

  publish:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'

    steps:
      - name: Check HEX_API_KEY is configured
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [ -z "${HEX_API_KEY}" ]; then
            echo "::error::HEX_API_KEY secret is not set. Add a hex.pm API key with write access under Settings > Secrets and variables > Actions, then re-run this job."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Check tag matches mix.exs version
        run: |
          version="$(grep -o 'version: "[^"]*"' mix.exs | head -1 | cut -d '"' -f 2)"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::mix.exs version ${version} does not match tag ${GITHUB_REF_NAME}"
            exit 1
          fi

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      # Compiling from a git checkout (no checksum file yet) takes the
      # cargo build path of the :forcola_shim compiler.
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: mix deps.get

      # Downloads the tarballs the build jobs just attached to the
      # release and writes the gitignored checksum-forcola_shim.exs
      # that ships in the hex package.
      - name: Generate checksum file
        run: mix forcola.checksum

      - name: Publish
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
