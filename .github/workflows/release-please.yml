name: Release Please

# Opens and maintains the release PR from conventional commits on main.
# Merging the release PR makes release-please create the vX.Y.Z tag and
# the GitHub release. Tags created with GITHUB_TOKEN do not fire
# on-tag-push workflows, so this workflow then dispatches release.yml
# at the new tag; that workflow builds the shim binaries, attaches
# them to the release, and publishes to hex.pm.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Dispatch release workflow for the new tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG_NAME"
